name: WAL CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install torch transformers datasets numpy scikit-learn
        pip install -e .[dev]

    - name: Run unit tests
      run: pytest -q tests

    - name: Run health check
      run: python experiments/m391_final_health_check.py

    - name: Run system test
      run: python experiments/m400_final_system_test.py

    - name: Run memory leak fix validation
      run: python experiments/m401_memory_leak_fix.py

    - name: Run security hardening validation
      run: python experiments/m402_prompt_injection_hardening.py

    - name: Validate JSON results
      run: python experiments/m397_validate_json_results.py
